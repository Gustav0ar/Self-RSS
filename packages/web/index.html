<!doctype html>
<html lang="en" class="h-full">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="light dark" />
		<meta name="description" content="Modern RSS reading that feels calm, focused, and fast." />
		<meta name="theme-color" content="#4f46e5" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="manifest" href="/site.webmanifest" />
		<title>SelfFeed</title>
		<script>
			// Prevent theme flash
			(() => {
				const stored = localStorage.getItem('rss-theme');
				const theme = stored === 'dark' || stored === 'amoled' || stored === 'light' ? stored : null;
				if (
					theme === 'dark' ||
					theme === 'amoled' ||
					(!theme && matchMedia('(prefers-color-scheme: dark)').matches)
				) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
	</head>
	<body class="h-full bg-background text-foreground antialiased">
		<div id="root" class="h-full"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
