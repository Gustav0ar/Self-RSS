name: Deploy

# Visibility strategy:
# - This workflow lives in a public repo, so its definition is public.
# - It runs inside the "production" environment, which is configured on
#   GitHub to require approval from a list of reviewers (the repo owner
#   in this case) and to be visible only to people with at least Write
#   access to the repo. Anonymous visitors to the Actions tab cannot see
#   the run logs, environment secrets, or environment variables.
# - The workflow uploads a deploy-summary artifact (image tag, commit
#   SHA, target host, status) that IS public, so anyone can verify
#   that a deploy happened without seeing the secret material.

on:
  workflow_run:
    workflows: ["Containers"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force:
        description: "Force deploy even if last containers build failed"
        required: false
        default: "false"

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # `environment: production` gates the job on the repo's protected
    # environment configuration. Configure the environment in the GitHub
    # UI to require reviewers and to limit visibility to repo members.
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build deploy summary (artifact only, no secrets)
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha && format('sha-{0}', github.event.workflow_run.head_sha) || format('sha-{0}', github.sha) }}
          VARS_IMAGE_OWNER: ${{ vars.IMAGE_OWNER_LOWERCASE }}
          VPS_HOST_SECRET: ${{ secrets.VPS_HOST }}
        run: |
          HOST_FP="$(printf '%s' "${VPS_HOST_SECRET}" | sha256sum | cut -c1-12)"
          cat > .github/deploy-summary.json <<EOF
          {
            "service": "self-feed",
            "image_tag": "${IMAGE_TAG}",
            "head_sha": "${HEAD_SHA}",
            "image_owner": "${VARS_IMAGE_OWNER}",
            "trigger": "${{ github.event_name }}",
            "host_fingerprint": "${HOST_FP}"
          }
          EOF

      - name: Upload public deploy summary
        uses: actions/upload-artifact@v4
        with:
          name: deploy-summary
          path: .github/deploy-summary.json
          if-no-files-found: error
          retention-days: 90

      - name: Prepare and test SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_KEY_FILE: ${{ runner.temp }}/vps_ssh_key
        run: |
          set -euo pipefail

          for name in VPS_HOST VPS_USERNAME VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not set in the production environment."
              exit 1
            fi
          done

          install -m 700 -d "$(dirname "${SSH_KEY_FILE}")" "${HOME}/.ssh"
          printf '%s\n' "${VPS_SSH_KEY}" | sed 's/\r$//' > "${SSH_KEY_FILE}"
          chmod 600 "${SSH_KEY_FILE}"

          if ! ssh-keygen -y -f "${SSH_KEY_FILE}" >/dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY is not a parseable private SSH key. Paste the full private key, including BEGIN/END lines and real newlines."
            exit 1
          fi

          KEY_FP="$(ssh-keygen -lf "${SSH_KEY_FILE}" | awk '{print $2}')"
          echo "Deploy key fingerprint: ${KEY_FP}"
          echo "Testing SSH authentication with the configured VPS host, port, and username..."

          if ! ssh -i "${SSH_KEY_FILE}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            -p "${VPS_PORT}" \
            "${VPS_USERNAME}@${VPS_HOST}" \
            true; then
            echo "::error::SSH authentication failed. Check that VPS_USERNAME is the account that owns authorized_keys and that VPS_SSH_KEY's public key is installed for that account."
            exit 1
          fi

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: ${{ runner.temp }}/vps_ssh_key
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail

            # Resolve configuration. Repo vars override defaults.
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/opt/self-feed' }}"
            COMPOSE_CMD="${{ vars.COMPOSE_COMMAND || 'docker compose' }}"
            REGISTRY="${{ vars.REGISTRY || 'ghcr.io' }}"
            HEAD_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
            IMAGE_OWNER="${{ vars.IMAGE_OWNER_LOWERCASE }}"
            IMAGE_TAG="sha-${HEAD_SHA:0:7}"
            read -r -a COMPOSE_ARGS <<< "${COMPOSE_CMD}"
            if [ "${#COMPOSE_ARGS[@]}" -eq 0 ]; then
              echo "COMPOSE_COMMAND is empty"
              exit 1
            fi
            if ! command -v "${COMPOSE_ARGS[0]}" >/dev/null 2>&1; then
              echo "Container CLI not found: ${COMPOSE_ARGS[0]}"
              exit 1
            fi
            CONTAINER_CLI="${COMPOSE_ARGS[0]}"
            if [ "${CONTAINER_CLI}" = "docker-compose" ]; then
              CONTAINER_CLI="docker"
            fi

            echo "::group::Deploy self-feed"
            echo "Target path : ${DEPLOY_PATH}"
            echo "Compose     : ${COMPOSE_CMD}"
            echo "Image       : ${REGISTRY}/${IMAGE_OWNER}/self-feed-api:${IMAGE_TAG}"
            echo "::endgroup::"

            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            dump_compose_diagnostics() {
              echo "::group::Compose diagnostics"
              "${COMPOSE_ARGS[@]}" -f docker-compose.yml ps || true
              "${COMPOSE_ARGS[@]}" -f docker-compose.yml logs --no-color --tail=120 api redis worker web || true
              echo "::endgroup::"
            }

            fail_with_diagnostics() {
              dump_compose_diagnostics
              exit 1
            }

            wait_for_container_health() {
              container="$1"
              label="$2"
              for i in $(seq 1 30); do
                status="$("${CONTAINER_CLI}" inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${container}" 2>/dev/null || true)"
                if [ "${status}" = "healthy" ] || [ "${status}" = "running" ]; then
                  echo "${label} healthy"
                  return 0
                fi
                if [ "${status}" = "unhealthy" ] || [ "${status}" = "exited" ] || [ "${status}" = "dead" ]; then
                  echo "${label} failed with container status: ${status}"
                  return 1
                fi
                sleep 2
              done
              echo "${label} did not become healthy in time"
              return 1
            }

            upsert_env_var() {
              key="$1"
              value="$2"
              tmp_file="$(mktemp)"
              grep -v -E "^${key}=" .env > "${tmp_file}" || true
              printf '%s=%s\n' "${key}" "${value}" >> "${tmp_file}"
              cat "${tmp_file}" > .env
              rm -f "${tmp_file}"
            }

            # Ensure the data dir exists for the SQLite volume.
            mkdir -p data
            chmod 777 data

            # Pull the deploy file from the repo so the VPS doesn't need
            # to be a separate git checkout. (Uses the workflow's
            # GITHUB_TOKEN to fetch the file at HEAD_SHA.)
            curl -fsSL \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.raw" \
              -o docker-compose.yml \
              "https://raw.githubusercontent.com/${{ github.repository }}/${HEAD_SHA}/docker-compose.yml"

            if [ ! -f .env ]; then
              echo ".env is missing in ${DEPLOY_PATH}; create it with the production secrets before deploying."
              exit 1
            fi

            # Persist non-secret image metadata so manual commands like
            # `docker compose logs` work on the VPS after deployment.
            upsert_env_var REGISTRY "${REGISTRY}"
            upsert_env_var IMAGE_OWNER_LOWERCASE "${IMAGE_OWNER}"
            upsert_env_var IMAGE_TAG "${IMAGE_TAG}"

            export IMAGE_TAG
            export IMAGE_OWNER_LOWERCASE="${IMAGE_OWNER}"
            export REGISTRY

            # Pull images, restart services, prune.
            "${COMPOSE_ARGS[@]}" -f docker-compose.yml pull || fail_with_diagnostics
            "${COMPOSE_ARGS[@]}" -f docker-compose.yml up -d --remove-orphans || fail_with_diagnostics

            wait_for_container_health selffeed-redis Redis || fail_with_diagnostics
            wait_for_container_health selffeed-api API || fail_with_diagnostics
            wait_for_container_health selffeed-web Web || fail_with_diagnostics
            wait_for_container_health selffeed-worker Worker || fail_with_diagnostics

            "${CONTAINER_CLI}" image prune -f
