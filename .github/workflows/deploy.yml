name: Deploy

# Visibility strategy:
# - This workflow lives in a public repo, so its definition is public.
# - It runs inside the "production" environment, which is configured on
#   GitHub to require approval from a list of reviewers (the repo owner
#   in this case) and to be visible only to people with at least Write
#   access to the repo. Anonymous visitors to the Actions tab cannot see
#   the run logs, environment secrets, or environment variables.
# - The workflow uploads a deploy-summary artifact (image tag, commit
#   SHA, target host, status) that IS public, so anyone can verify
#   that a deploy happened without seeing the secret material.

on:
  workflow_run:
    workflows: ["Containers"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force:
        description: "Force deploy even if last containers build failed"
        required: false
        default: "false"

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # `environment: production` gates the job on the repo's protected
    # environment configuration. Configure the environment in the GitHub
    # UI to require reviewers and to limit visibility to repo members.
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Build deploy summary (artifact only, no secrets)
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          VARS_IMAGE_OWNER: ${{ vars.IMAGE_OWNER_LOWERCASE }}
          VPS_HOST_SECRET: ${{ secrets.VPS_HOST }}
        run: |
          HEAD_SHA_SHORT="$(printf '%s' "${HEAD_SHA}" | cut -c1-7)"
          IMAGE_TAG="sha-${HEAD_SHA_SHORT}"
          HOST_FP="$(printf '%s' "${VPS_HOST_SECRET}" | sha256sum | cut -c1-12)"
          cat > .github/deploy-summary.json <<EOF
          {
            "service": "self-feed",
            "image_tag": "${IMAGE_TAG}",
            "head_sha": "${HEAD_SHA}",
            "image_owner": "${VARS_IMAGE_OWNER}",
            "trigger": "${{ github.event_name }}",
            "host_fingerprint": "${HOST_FP}"
          }
          EOF

      - name: Upload public deploy summary
        uses: actions/upload-artifact@v7
        with:
          name: deploy-summary
          path: .github/deploy-summary.json
          if-no-files-found: error
          retention-days: 90

      - name: Prepare and test SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_KEY_FILE: ${{ runner.temp }}/vps_ssh_key
        run: |
          set -euo pipefail

          for name in VPS_HOST VPS_USERNAME VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not set in the production environment."
              exit 1
            fi
          done

          install -m 700 -d "$(dirname "${SSH_KEY_FILE}")" "${HOME}/.ssh"
          printf '%s\n' "${VPS_SSH_KEY}" | sed 's/\r$//' > "${SSH_KEY_FILE}"
          chmod 600 "${SSH_KEY_FILE}"

          if ! ssh-keygen -y -f "${SSH_KEY_FILE}" >/dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY is not a parseable private SSH key. Paste the full private key, including BEGIN/END lines and real newlines."
            exit 1
          fi

          KEY_FP="$(ssh-keygen -lf "${SSH_KEY_FILE}" | awk '{print $2}')"
          echo "Deploy key fingerprint: ${KEY_FP}"
          echo "Testing SSH authentication with the configured VPS host, port, and username..."

          if ! ssh -i "${SSH_KEY_FILE}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            -p "${VPS_PORT}" \
            "${VPS_USERNAME}@${VPS_HOST}" \
            true; then
            echo "::error::SSH authentication failed. Check that VPS_USERNAME is the account that owns authorized_keys and that VPS_SSH_KEY's public key is installed for that account."
            exit 1
          fi

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/self-feed' }}
          COMPOSE_CMD: ${{ vars.COMPOSE_COMMAND || 'docker compose' }}
          REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          IMAGE_OWNER: ${{ vars.IMAGE_OWNER_LOWERCASE }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: ${{ runner.temp }}/vps_ssh_key
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DEPLOY_PATH,COMPOSE_CMD,REGISTRY,HEAD_SHA,IMAGE_OWNER,GITHUB_REPOSITORY,GITHUB_TOKEN
          script: |
            set -euo pipefail
            HEAD_SHA_SHORT="$(printf '%s' "${HEAD_SHA}" | cut -c1-7)"
            DEPLOY_SCRIPT_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${HEAD_SHA}/scripts/deploy-vps.sh"
            curl_headers=(-H "Accept: application/vnd.github.raw")
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              curl_headers+=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
            fi
            curl -fsSL "${curl_headers[@]}" -o /tmp/self-feed-deploy.sh "${DEPLOY_SCRIPT_URL}"
            chmod 700 /tmp/self-feed-deploy.sh
            IMAGE_TAG="sha-${HEAD_SHA_SHORT}" /tmp/self-feed-deploy.sh
