name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bash -n scripts/*.sh

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: export DATABASE_URL=data/rss.db && bun run db:generate
      - run: bun run openapi:generate
      - name: Verify generated OpenAPI is committed
        run: git diff --exit-code -- packages/api/openapi.json
      - run: bun run test
      - run: bun run --filter '@self-feed/web' playwright:install
      - run: bun run test:integration
      - run: bun run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run build
