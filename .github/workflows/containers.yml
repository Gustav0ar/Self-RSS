name: Containers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push multi-arch images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: image-prefix
        name: Prepare image prefix
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "value=${owner}/self-feed" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - name: Pre-pull BuildKit image
        run: |
          for attempt in 1 2 3 4 5; do
            if docker pull moby/buildkit:buildx-stable-1; then
              exit 0
            fi

            sleep_seconds=$((attempt * 10))
            echo "BuildKit image pull failed; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

          docker pull moby/buildkit:buildx-stable-1

      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-api
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.api
          push: false
          load: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          labels: ${{ steps.meta-api.outputs.labels }}
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Tag API image for scanning
        run: |
          # Tag with a predictable name for scanning
          docker tag \
            "${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-api:latest" \
            "api-scan:latest" || true
          docker tag \
            "${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-api:${{ github.ref_name }}" \
            "api-scan:latest" || true

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api-scan:latest'
          format: 'sarif'
          output: 'trivy-results-api.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload API scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-api.sarif'
          category: 'trivy/api-image'

      - name: Push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.api
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          labels: ${{ steps.meta-api.outputs.labels }}
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha,scope=api

      - id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-web
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: false
          load: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          labels: ${{ steps.meta-web.outputs.labels }}
          tags: ${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Tag Web image for scanning
        run: |
          docker tag \
            "${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-web:latest" \
            "web-scan:latest" || true
          docker tag \
            "${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-web:${{ github.ref_name }}" \
            "web-scan:latest" || true

      - name: Scan Web image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'web-scan:latest'
          format: 'sarif'
          output: 'trivy-results-web.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Web scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-web.sarif'
          category: 'trivy/web-image'

      - name: Push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          labels: ${{ steps.meta-web.outputs.labels }}
          tags: ${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha,scope=web
