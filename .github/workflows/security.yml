name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.95.5
        with:
          path: ./
          extra_args: --results=verified,unknown

  filesystem-scan:
    name: Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Audit dependencies for high and critical advisories
        shell: bash
        run: |
          set +e
          bun audit --json > audit-results.json
          audit_status=$?
          set -e
          if [ "${audit_status}" -gt 1 ]; then
            exit "${audit_status}"
          fi
          bun scripts/check-bun-audit.ts audit-results.json high
      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-audit-results
          path: audit-results.json
          if-no-files-found: ignore
          retention-days: 30
