name: Android CI

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/android/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

jobs:
  android-unit-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run Android unit tests
        run: ./packages/android/gradlew -p packages/android :app:testDebugUnitTest

  android-build-check:
    name: Android Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run Android lint
        run: ./packages/android/gradlew -p packages/android :app:lintDebug
      - name: Assemble Android debug
        run: ./packages/android/gradlew -p packages/android :app:assembleDebug
